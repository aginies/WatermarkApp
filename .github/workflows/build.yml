name: Build & Release Flutter App

on:
  push:
    branches: [ "main", "master" ]
    tags:
      - 'v*' # Trigger on version tags like v1.0.0
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

permissions:
  contents: write # Needed to create releases

jobs:
  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
      - name: Install dependencies
        run: flutter pub get
      - name: Build APK
        run: flutter build apk --release
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk

  build-ios:
    name: Build iOS/iPad
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
      - name: Install dependencies
        run: flutter pub get
      - name: Build iOS (No Codesign)
        run: flutter build ios --release --no-codesign
      - name: Package iOS Build
        run: |
          cd build/ios/iphoneos
          zip -r ../../../watermark-app-ios.zip Runner.app
      - name: Upload iOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-release-app
          path: watermark-app-ios.zip

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
      - name: Install dependencies
        run: flutter pub get
      - name: Build Windows
        run: flutter build windows --release
      - name: Package Windows Build
        run: |
          Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath watermark-app-windows.zip
      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-release-exe
          path: watermark-app-windows.zip

  create-release:
    name: Create GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-android, build-ios, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download Android Artifact
        uses: actions/download-artifact@v4
        with:
          name: android-release-apk
          
      - name: Download iOS Artifact
        uses: actions/download-artifact@v4
        with:
          name: ios-release-app
          
      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-release-exe

      - name: Rename Files for Release
        run: |
          mv app-release.apk WatermarkApp-Android.apk
          mv watermark-app-ios.zip WatermarkApp-iOS-verification.zip
          mv watermark-app-windows.zip WatermarkApp-Windows.zip

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            WatermarkApp-Android.apk
            WatermarkApp-iOS-verification.zip
            WatermarkApp-Windows.zip
          generate_release_notes: true
          draft: false
          prerelease: false
