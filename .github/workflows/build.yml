name: Build & Release SecureMark

on:
  push:
    branches: [ "main", "master" ]
    tags:
      - 'v*' # Trigger on version tags like v1.0.0
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v1.0.0)'
        required: true
        default: 'v1.0.0'

permissions:
  contents: write # Needed to create releases

jobs:
  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
      - name: Install dependencies
        run: flutter pub get
      - name: Build APK
        run: flutter build apk --release
      - name: Verify APK exists
        run: |
          if [ -f "build/app/outputs/flutter-apk/app-release.apk" ]; then
            echo "✅ APK built successfully"
            ls -la build/app/outputs/flutter-apk/app-release.apk
          else
            echo "❌ APK not found"
            find build -name "*.apk" -exec ls -la {} \;
          fi
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

  build-linux:
    name: Build Linux (AppImage)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
      - name: Install dependencies
        run: flutter pub get
      - name: Build Linux
        run: flutter build linux --release
      - name: Package AppImage
        run: |
          # Download linuxdeploy
          wget https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage
          
          # Prepare AppDir structure
          mkdir -p AppDir/usr/bin
          
          # Copy binary and bundle assets
          cp -r build/linux/x64/release/bundle/* AppDir/usr/bin/
          
          # Create the desktop file with name matching binary
          cat > SecureMark.desktop <<EOF
          [Desktop Entry]
          Type=Application
          Name=SecureMark
          Icon=SecureMark
          Exec=SecureMark
          Categories=Utility;
          EOF
          
          # Prepare the icon with name matching Icon entry
          cp web/icons/Icon-512.png SecureMark.png
          
          # Use linuxdeploy to create the AppImage
          export ARCH=x86_64
          ./linuxdeploy-x86_64.AppImage --appimage-extract-and-run \
            --executable AppDir/usr/bin/SecureMark \
            --desktop-file SecureMark.desktop \
            --icon-file SecureMark.png \
            --appdir AppDir \
            --output appimage
          
          # Move result to a predictable name
          find . -maxdepth 1 -name "SecureMark*.AppImage" -exec mv {} SecureMark-Linux.AppImage \;
      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-release-appimage
          path: SecureMark-Linux.AppImage
          if-no-files-found: error

  build-ios:
    name: Build iOS/iPad
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
      - name: Install dependencies
        run: flutter pub get
      - name: Build iOS (No Codesign)
        run: flutter build ios --release --no-codesign
      - name: Package iOS Build
        run: |
          cd build/ios/iphoneos
          if [ -d "Runner.app" ]; then
            zip -r ../../../secure-mark-ios.zip Runner.app
            echo "✅ iOS app packaged successfully"
            ls -la ../../../secure-mark-ios.zip
          else
            echo "❌ Runner.app not found"
            find . -name "*.app" -exec ls -la {} \;
          fi
      - name: Upload iOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-release-app
          path: secure-mark-ios.zip
          if-no-files-found: error

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
      - name: Install dependencies
        run: flutter pub get
      - name: Build Windows
        run: flutter build windows --release
      - name: Verify Windows build
        run: |
          if (Test-Path "build\windows\x64\runner\Release") {
            Write-Host "✅ Windows build completed successfully"
            Get-ChildItem -Recurse "build\windows\x64\runner\Release" | Format-Table Name, Length
          } else {
            Write-Host "❌ Windows build directory not found"
            Get-ChildItem -Recurse "build\windows" | Format-Table FullName
          }
        shell: powershell
      - name: Package Windows Build
        run: |
          Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath secure-mark-windows.zip
          if (Test-Path "secure-mark-windows.zip") {
            Write-Host "✅ Windows ZIP created successfully"
            Get-Item "secure-mark-windows.zip" | Format-List Name, Length
          } else {
            Write-Host "❌ Windows ZIP creation failed"
          }
        shell: powershell
      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-release-exe
          path: secure-mark-windows.zip
          if-no-files-found: error

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
      - name: Install dependencies
        run: flutter pub get
      - name: Build macOS
        run: flutter build macos --release
      - name: Package macOS Build
        run: |
          cd build/macos/Build/Products/Release
          if [ -d "SecureMark.app" ]; then
            zip -r ../../../../../secure-mark-macos.zip SecureMark.app
            echo "✅ macOS app packaged successfully"
            ls -la ../../../../../secure-mark-macos.zip
          else
            echo "❌ SecureMark.app not found"
            find . -name "*.app" -exec ls -la {} \;
          fi
      - name: Upload macOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-release-app
          path: secure-mark-macos.zip
          if-no-files-found: error

  create-release:
    name: Create GitHub Release
    needs: [build-android, build-linux, build-ios, build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Download Android Artifact
        uses: actions/download-artifact@v4
        with:
          name: android-release-apk
          path: ./artifacts/android
          
      - name: Download Linux Artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-release-appimage
          path: ./artifacts/linux

      - name: Download iOS Artifact
        uses: actions/download-artifact@v4
        with:
          name: ios-release-app
          path: ./artifacts/ios
          
      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-release-exe
          path: ./artifacts/windows

      - name: Download macOS Artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-release-app
          path: ./artifacts/macos

      - name: Debug - List Downloaded Files
        run: |
          echo "=== Listing all downloaded artifacts ==="
          find ./artifacts -type f -exec ls -la {} \;
          echo "=== Current directory contents ==="
          ls -la

      - name: Rename Files for Release
        run: |
          # Create release directory
          mkdir -p ./release
          
          # Copy and rename Android APK
          if [ -f "./artifacts/android/app-release.apk" ]; then
            cp "./artifacts/android/app-release.apk" "./release/SecureMark-Android.apk"
            echo "✅ Android APK copied successfully"
          fi
          
          # Copy and rename Linux AppImage
          if [ -f "./artifacts/linux/SecureMark-Linux.AppImage" ]; then
            cp "./artifacts/linux/SecureMark-Linux.AppImage" "./release/SecureMark-Linux.AppImage"
            echo "✅ Linux AppImage copied successfully"
          fi

          # Copy and rename iOS ZIP
          if [ -f "./artifacts/ios/secure-mark-ios.zip" ]; then
            cp "./artifacts/ios/secure-mark-ios.zip" "./release/SecureMark-iOS.zip"
            echo "✅ iOS ZIP copied successfully"
          fi
          
          # Copy and rename Windows ZIP
          if [ -f "./artifacts/windows/secure-mark-windows.zip" ]; then
            cp "./artifacts/windows/secure-mark-windows.zip" "./release/SecureMark-Windows.zip"
            echo "✅ Windows ZIP copied successfully"
          fi

          # Copy and rename macOS ZIP
          if [ -f "./artifacts/macos/secure-mark-macos.zip" ]; then
            cp "./artifacts/macos/secure-mark-macos.zip" "./release/SecureMark-macOS.zip"
            echo "✅ macOS ZIP copied successfully"
          fi
          
          echo "=== Final release files ==="
          ls -la ./release/

      - name: Verify All Artifacts Present
        run: |
          echo "=== Checking for required release files ==="
          MISSING_FILES=0
          
          for file in "SecureMark-Android.apk" "SecureMark-Linux.AppImage" "SecureMark-iOS.zip" "SecureMark-Windows.zip" "SecureMark-macOS.zip"; do
            if [ ! -f "./release/$file" ]; then
              echo "❌ $file missing"
              MISSING_FILES=$((MISSING_FILES + 1))
            else
              echo "✅ $file present"
            fi
          done
          
          if [ $MISSING_FILES -gt 0 ]; then
            echo "❌ $MISSING_FILES file(s) missing. Release will proceed with available files."
          else
            echo "✅ All release files present"
          fi

      - name: Create Release Notes
        run: |
          # Determine version name
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          elif [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          elif [ "${{ github.event_name }}" == "pull_request" ]; then
            VERSION="pr-${{ github.event.pull_request.number }}"
          else
            VERSION="latest"
          fi
          
          echo "# SecureMark Release ${VERSION}" > release_notes.md
          echo "" >> release_notes.md
          echo "## Build Info" >> release_notes.md
          echo "- **Event**: ${{ github.event_name }}" >> release_notes.md
          echo "- **SHA**: ${GITHUB_SHA}" >> release_notes.md
          echo "" >> release_notes.md
          echo "## What's New" >> release_notes.md
          echo "- Secure documents with customizable securemarks" >> release_notes.md
          echo "- Support for PNG, JPG, HEIC, and PDF files" >> release_notes.md
          echo "- High-quality vector PDF watermarking" >> release_notes.md
          echo "- Privacy-focused: strip EXIF data and other data by default" >> release_notes.md
          echo "- **Linux Support**: Now available as a portable AppImage!" >> release_notes.md
          echo "" >> release_notes.md
          echo "## Downloads" >> release_notes.md
          echo "- **Android**: Install the APK file on your Android device" >> release_notes.md
          echo "- **Linux**: Download and run the `.AppImage` (make it executable with `chmod +x`)" >> release_notes.md
          echo "- **macOS**: Extract and run the application. you also needs to do: https://wiki.hacks.guide/wiki/Open_unsigned_applications_on_macOS_Sequoia_and_newer" >> release_notes.md
          echo "- **Windows**: Extract and run the executable. If you see a DLL error, install the [Visual C++ Redistributable](https://aka.ms/vc14/vc_redist.x64.exe)" >> release_notes.md
          echo "- **iOS**: For development/verification only (requires Xcode)" >> release_notes.md

      - name: Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.event.inputs.version || (startsWith(github.ref, 'refs/tags/') && github.ref_name) || 'latest' }}
          name: ${{ github.event.inputs.version || (startsWith(github.ref, 'refs/tags/') && github.ref_name) || 'Latest Build' }}
          files: ./release/*
          body_path: release_notes.md
          draft: false
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/v') }}
          fail_on_unmatched_files: false
          generate_release_notes: true
