name: watermark_app
description: WaterMarkApp - A professional watermark application for images and PDFs
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  pdf: ^3.10.6
  printing: ^5.14.3
  desktop_drop: ^0.7.0
  file_selector: ^1.1.0
  image: ^4.1.7
  intl: ^0.20.2
  path: ^1.9.1
  share_plus: ^11.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  generate: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21
